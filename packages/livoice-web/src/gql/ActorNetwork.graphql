query ActorNetwork(
  $actorWhere: ActorWhereInput! = {}
  $actorLinkWhere: ActorLinkWhereInput! = {}
  $actorsTake: Int = 500
  $linksTake: Int = 3000
) {
  actors(where: $actorWhere, orderBy: { name: asc }, take: $actorsTake) {
    id
    name
    type
    imageUrl
  }
  actorLinks(where: $actorLinkWhere, orderBy: { createdAt: desc }, take: $linksTake) {
    id
    linkType
    confidence
    fromActor {
      id
    }
    toActor {
      id
    }
  }
}
